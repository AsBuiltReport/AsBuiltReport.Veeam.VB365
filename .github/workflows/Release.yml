name: Publish PowerShell Module

on:
  release:
    types: [published]

jobs:
  publish-to-gallery:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set PSRepository to Trusted for PowerShell Gallery
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
      - name: Install AsBuiltReport.Core module
        shell: pwsh
        run: |
          Install-Module -Name AsBuiltReport.Core -Repository PSGallery -Force
      - name: Install AsBuiltReport.Diagram module
        shell: pwsh
        run: |
          Install-Module -Name AsBuiltReport.Diagram -Repository PSGallery -Force
      - name: Install AsBuiltReport.Chart module
        shell: pwsh
        run: |
          Install-Module -Name AsBuiltReport.Chart -Repository PSGallery -Force
      - name: Test Module Manifest
        shell: pwsh
        run: |
          Test-ModuleManifest .\AsBuiltReport.Veeam.VB365\AsBuiltReport.Veeam.VB365.psd1
      - name: Publish module to PowerShell Gallery
        shell: pwsh
        run: |
          Publish-Module -Path ./ -NuGetApiKey ${{ secrets.PSGALLERY_API_KEY }} -Verbose
  bsky-post:
    needs: publish-to-gallery
    runs-on: ubuntu-latest
    steps:
      - uses: zentered/bluesky-post-action@v0.4.0
        with:
          post: "[New Release] ${{ github.event.repository.name }} ${{ github.event.release.tag_name }}! Check out what's new! ${{ github.event.release.html_url }} #Veeam #AsBuiltReport #PowerShell #VeeamVanguard #VeeamLegend"
        env:
          BSKY_IDENTIFIER: ${{ secrets.BSKY_IDENTIFIER }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
